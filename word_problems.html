<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>列算式解应用题</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--amber:#F5A623;--amber-light:#FFF3D6;--amber-dark:#C47B00;--orange:#FF7F3E;--correct:#3D9E3D;--wrong:#D94040;--cream:#FFFBF2;}
html,body{min-height:100%;background:#D8EFE4;display:flex;align-items:flex-start;justify-content:center;padding:24px 0;font-family:'Noto Sans SC',sans-serif;}
.phone{width:min(390px,100vw);background:var(--cream);display:flex;flex-direction:column;border-radius:32px;box-shadow:0 20px 60px rgba(0,0,0,0.18);overflow:hidden;}
.stem{background:linear-gradient(135deg,#FFF8E1 0%,#FFF3D0 100%);padding:16px 20px 14px;border-bottom:2px dashed #F5D78A;position:relative;}
.stem-nav{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:#FFF3D0;border:1.5px solid #F5C842;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .12s;box-shadow:0 2px 0 #D4A800;}
.stem-nav:hover{background:#FFE580;transform:scale(1.08);}
.stem-nav:active{transform:scale(0.95);}
.stem-nav svg{width:14px;height:14px;}
.stem-tag{display:inline-block;background:var(--amber);color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:2px 10px;border-radius:20px;margin-bottom:8px;}
.stem-text{font-family:'Ma Shan Zheng',cursive;font-size:19px;color:#3A2800;line-height:1.75;}
@keyframes speakerPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(245,185,0,0.4);}50%{transform:scale(1.12);box-shadow:0 0 0 5px rgba(245,185,0,0);}}
.speaker-btn{width:24px;height:24px;border-radius:50%;background:#FFF3D0;border:1px solid #F5C842;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;vertical-align:middle;margin-right:4px;position:relative;top:-1px;transition:background .15s,transform .12s;}
.speaker-btn:hover{background:#FFE580;transform:scale(1.08);}
.speaker-btn.speaking{background:#FFD94A;border-color:var(--amber);animation:speakerPulse 0.8s ease-in-out infinite;}
@keyframes hlPulse{
  0%,100%{transform:scale(1);box-shadow:0 3px 0 #D4A800,0 0 0 0 rgba(245,185,0,0.5);}
  50%{transform:scale(1.1);box-shadow:0 4px 0 #D4A800,0 0 0 7px rgba(245,185,0,0);}
}
.read-seg{border-radius:6px;transition:background .2s;}
.read-seg.reading{background:rgba(255,220,80,0.22);}
.hl-btn{display:inline-block;background:#FFE08A;border:2px solid #F5C842;border-radius:20px;padding:1px 10px;color:#8B5A00;cursor:pointer;font-family:'Ma Shan Zheng',cursive;font-size:19px;transition:transform .15s,background .15s,box-shadow .15s;box-shadow:0 3px 0 #D4A800;user-select:none;}
.hl-btn.pre{border-color:transparent;box-shadow:none;cursor:default;pointer-events:none;border-radius:6px;padding:0 4px;animation:none;}
.hl-btn.pending{animation:hlPulse 1.2s ease-in-out infinite;border-width:2.5px;}
.hl-btn-b.pending{animation-delay:.4s;}
.hl-btn-d.pending{animation-delay:.2s;}
.hl-btn-e.pending{animation-delay:.6s;}
.hl-btn-f.pending{animation-delay:.3s;}
.hl-btn-g.pending{animation-delay:.5s;}
.hl-btn:hover{background:#FFD94A;transform:scale(1.06);}
.hl-btn:active{transform:scale(.96) translateY(2px);box-shadow:0 1px 0 #D4A800;}
.hl-btn.revealed{background:#FFE08A;border-color:transparent;box-shadow:none;cursor:default;pointer-events:none;border-radius:6px;padding:0 4px;animation:none;}
.hl-btn-b{background:#FFD4A0;border-color:#F5A050;box-shadow:0 3px 0 #C86800;color:#7B3A00;}
.hl-btn-b:hover{background:#FFBB70;}
.hl-btn-b.revealed{background:#FFD4A0;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;animation:none;}
.hl-btn-c{background:#D4F0C0;border-color:#7DC95A;box-shadow:0 3px 0 #4A9E2A;color:#2A6010;}
.hl-btn-c:hover{background:#BFEA9A;}
.hl-btn-c.revealed{background:#D4F0C0;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;color:#2A6010;animation:none;}
.hl-btn-d{background:#D4E8FF;border-color:#70AAEE;box-shadow:0 3px 0 #3070C0;color:#1A4080;}
.hl-btn-d:hover{background:#B8D8FF;}
.hl-btn-d.revealed{background:#D4E8FF;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;color:#1A4080;animation:none;}
.hl-btn-e{background:#EDE0FF;border-color:#A070E0;box-shadow:0 3px 0 #7040B0;color:#5020A0;}
.hl-btn-e:hover{background:#D8C0FF;}
.hl-btn-e.revealed{background:#EDE0FF;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;color:#5020A0;animation:none;}
.hl-btn-f{background:#D8EEFF;border-color:#5090D8;box-shadow:0 3px 0 #2060A8;color:#1040A0;}
.hl-btn-f:hover{background:#B8D8FF;}
.hl-btn-f.revealed{background:#D8EEFF;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;color:#1040A0;animation:none;}
.hl-btn-g{background:#F0E4D0;border-color:#A0784A;box-shadow:0 3px 0 #7A5030;color:#5A3010;}
.hl-btn-g:hover{background:#E0CCAA;}
.hl-btn-g.revealed{background:#F0E4D0;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;color:#5A3010;animation:none;}
.hl-btn-h{background:#FFE0E0;border-color:#E05050;box-shadow:0 3px 0 #A02020;color:#A00000;}
.hl-btn-h:hover{background:#FFC0C0;}
.hl-btn-h.revealed{background:#FFE0E0;border-color:transparent;box-shadow:none;border-radius:6px;padding:0 4px;color:#A00000;animation:none;}
.question-mark{color:var(--orange);font-weight:700;}
.scene{flex-shrink:0;height:200px;position:relative;overflow:hidden;}
.scene svg{display:block;width:100%;height:100%;}
.interact{padding:16px 16px 24px;display:flex;flex-direction:column;gap:16px;background:#FFFBF2;}
.section-title{font-size:12px;color:#A0845A;font-weight:700;letter-spacing:.07em;margin-bottom:6px;}
.interact.locked .section-title{opacity:0;}
.interact.locked .answer-bar{opacity:0;}
.answer-bar{width:100%;min-height:50px;border-bottom:3px solid #D4BF96;display:flex;align-items:center;padding:4px 6px;gap:4px;flex-wrap:nowrap;transition:border-color .2s;}
.answer-bar.has-content{border-color:var(--amber);}
.answer-bar.drag-over{border-color:var(--amber);background:#FFF8E0;}
.drop-indicator{width:3px;min-width:3px;height:32px;background:#F5A030;border-radius:3px;pointer-events:none;flex-shrink:0;}
.chip-placed{background:var(--amber-light);border:1.5px solid #F5D48A;border-radius:10px;padding:4px 9px;font-size:18px;color:var(--amber-dark);font-weight:700;white-space:nowrap;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;cursor:pointer;user-select:none;transition:background .12s,transform .1s;}
.answer-bar.compact .chip-placed{font-size:15px;padding:3px 7px;}
.chip-placed:hover{background:#FFE9A0;transform:scale(1.05);}
@keyframes popIn{from{transform:scale(.4) translateY(-10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
@keyframes popOut{from{transform:scale(1);opacity:1;}to{transform:scale(.4) translateY(-10px);opacity:0;}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.step-question{font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:700;color:#1A4080;background:#EEF6FF;border-left:4px solid #4A90D9;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:8px;line-height:1.4;opacity:0;}
.step-question.show{animation:fadeSlideIn .4s ease forwards;}
.answer-bar.ms-show{animation:fadeSlideIn .4s ease forwards;}
.options-row.ms-show{animation:fadeSlideIn .4s ease forwards;}
.step-record{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;}
.step-done{font-size:12px;color:#6A5020;background:#FFF3D0;border-radius:6px;padding:3px 8px;opacity:0;transform:translateY(6px);transition:opacity .4s ease, transform .4s ease;}
.step-done.show{opacity:1;transform:translateY(0);}
@keyframes chipFlyUp{0%{opacity:1;transform:scale(1) translateY(0);}100%{opacity:0;transform:scale(0.6) translateY(-24px);}}
.chip{background:#FFF8E1;border:2px solid #F5D48A;border-radius:50px;padding:8px 18px;font-size:20px;font-weight:700;color:#7B4F00;cursor:grab;transition:transform .12s,background .12s,opacity .2s;user-select:none;touch-action:none;}
.options-row.compact{gap:5px;}
.options-row.compact .chip{padding:5px 9px;font-size:15px;}
.options-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.chip:hover:not(.used){background:#FFE9A0;transform:scale(1.08);}
.chip.used{opacity:.28;pointer-events:none;}
.chip.dragging{opacity:.5;cursor:grabbing;}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;background:#FFE9A0;border:2px solid #F5C842;border-radius:50px;padding:7px 16px;font-size:19px;font-weight:700;color:#7B4F00;box-shadow:0 4px 16px rgba(0,0,0,.18);white-space:nowrap;}
.interact.locked .chip{opacity:.3;pointer-events:none;}
.feedback-area{min-height:28px;display:flex;align-items:center;justify-content:center;}
.feedback{font-family:'Ma Shan Zheng',cursive;font-size:18px;opacity:0;transition:opacity .3s;text-align:center;}
.feedback.show{opacity:1;}
.feedback.correct{color:var(--correct);}
.feedback.wrong{color:var(--wrong);}
.btn-row{display:flex;gap:10px;justify-content:center;}
.reset-btn{background:none;border:1.5px solid #D4BF96;border-radius:50px;padding:7px 20px;font-size:13px;color:#A0845A;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:background .15s;}
.reset-btn:hover{background:#FFF3D0;color:#7B4F00;}
.submit-btn{background:#4A90D9;border:none;border-radius:50px;padding:7px 22px;font-size:13px;color:#fff;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:700;box-shadow:0 3px 0 #2A6090;transition:background .15s,transform .1s;opacity:0.4;pointer-events:none;}
.submit-btn:hover{background:#3A80C9;transform:scale(1.04);}
.submit-btn.ready{opacity:1;pointer-events:auto;}
.next-btn{background:var(--amber);border:none;border-radius:50px;padding:7px 22px;font-size:13px;color:#fff;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:700;box-shadow:0 3px 0 #C47B00;transition:background .15s,transform .1s;display:none;}
.next-btn:hover{background:#E8941A;transform:scale(1.04);}
.next-btn.visible{display:block;}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden;}
.confetti-piece{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes chickBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.chick-group{opacity:0;pointer-events:none;transition:opacity .4s ease;}
.chick-group.visible{opacity:1;pointer-events:auto;}
.chick-inner.bounce{animation:chickBounce .4s ease-in-out 3;}
</style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<button id="muteBtn" onclick="toggleMute()" title="背景音乐" style="position:fixed;bottom:14px;right:14px;z-index:999;width:36px;height:36px;border-radius:50%;border:1.5px solid #D4BF96;background:#FFF8E1;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.12);">🎵</button>
<div class="phone" id="appRoot"></div>
<script>
var _ac;
function ac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(f,t,d,v){v=v||0.25;try{var c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}

// ── Background music (looped MP3, quiet under TTS) ────────
var _bgPlaying=false;
var _bgAudio=null;

function ensureBgAudio(){
  if(!_bgAudio){
    _bgAudio=new Audio('videoplayback.mp3');
    _bgAudio.loop=true;
    _bgAudio.preload='auto';
    // Keep BGM below speech / SFX (adjust if needed)
    _bgAudio.volume=0.22;
  }
  return _bgAudio;
}

function startBgMusic(){
  if(_bgPlaying)return;
  _bgPlaying=true;
  var a=ensureBgAudio();
  var p=a.play();
  if(p&&typeof p.catch==='function')p.catch(function(){_bgPlaying=false;});
}

function stopBgMusic(){
  _bgPlaying=false;
  if(_bgAudio)_bgAudio.pause();
}
function toggleMute(){
  var btn=document.getElementById('muteBtn');
  if(_bgPlaying){stopBgMusic();if(btn)btn.textContent='🔇';}
  else{startBgMusic();if(btn)btn.textContent='🎵';}
}
function sndReveal(){[523,659,784].forEach(function(f,i){setTimeout(function(){tone(f,'sine',.18,.25);},i*80);});}
function sndPlace(){tone(880,'sine',.1,.2);}
function sndRemove(){tone(420,'triangle',.09,.15);}
function sndCorrect(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,'sine',.2,.28);},i*70);});}
function sndWrong(){tone(280,'sawtooth',.22,.18);setTimeout(function(){tone(250,'sawtooth',.18,.2);},120);}

// ── Auto-read engine ──────────────────────────────────────
var _readSegs=[], _readIdx=0, _readPaused=false, _readWaitGroup=null;
var _waitMergeAnim=false;
var _readGen=0; // incremented on each startAutoRead to invalidate stale callbacks

// Delay (ms) after BGM starts before first TTS segment — music leads, then narration
var _READ_AFTER_BGM_MS=1800;

function startAutoRead(){
  var q=QUESTIONS[cQ];
  if(!q.readSegments)return;
  _readGen++;
  _readSegs=q.readSegments; _readIdx=0; _readPaused=false; _readWaitGroup=null;
  ttsCancel();
  startBgMusic();
  var gen=_readGen;
  setTimeout(function(){if(gen===_readGen)readNextSeg();},_READ_AFTER_BGM_MS);
}

function readNextSeg(){
  if(_readIdx>=_readSegs.length)return;
  var seg=_readSegs[_readIdx];
  var gen=_readGen; // capture current generation
  _readPaused=false; _readWaitGroup=null;

  if(seg.segId){
    var el=document.getElementById('rseg-'+seg.segId);
    if(el)el.classList.add('reading');
  }

  var _spkBtn=document.getElementById('speakerBtn');
  if(_spkBtn)_spkBtn.classList.add('speaking');
  var _ended=false;
  function onSegEnd(){
    if(_ended||gen!==_readGen)return; _ended=true;
    if(_spkBtn)_spkBtn.classList.remove('speaking');
    if(seg.segId){var el=document.getElementById('rseg-'+seg.segId);if(el)el.classList.remove('reading');}
    if(seg.waitFor&&!st[seg.waitFor]){
      _readPaused=true;
      _readWaitGroup=seg.waitFor;
      activatePreBtns(seg.segId, seg.waitFor);
    } else {
      _readIdx++;
      var q=QUESTIONS[cQ];
      if(q.isMultiStep&&_readIdx>=_readSegs.length&&st.msStep===0&&!st.done){
        if(!_waitMergeAnim) setTimeout(showMSQuestion,500);
      } else {
        setTimeout(readNextSeg,250);
      }
    }
  }
  function onSegErr(){
    if(_ended||gen!==_readGen)return; _ended=true;
    if(_spkBtn)_spkBtn.classList.remove('speaking');
    if(seg.segId){var el=document.getElementById('rseg-'+seg.segId);if(el)el.classList.remove('reading');}
    _readIdx++;setTimeout(readNextSeg,250);
  }
  ttsSpeak(seg.text, onSegEnd, onSegErr);
}

// ── TTS API ───────────────────────────────────────────────
var _ttsCache={};  // text → mp3 url cache
var _ttsAudio=null; // current playing audio
var _ttsPlayRetryRem=null; // remove listeners if ttsCancel runs before retry

function ttsSpeak(txt, onend, onerror){
  txt=txt.trim();
  if(!txt){if(onend)onend();return;}
  ttsCancel();
  function clearPlayRetry(){
    if(_ttsPlayRetryRem){_ttsPlayRetryRem();_ttsPlayRetryRem=null;}
  }
  function play(url){
    var a=new Audio(url);
    _ttsAudio=a;
    a.volume=0.9;
    a.onended=function(){clearPlayRetry();_ttsAudio=null;if(onend)onend();};
    a.onerror=function(){clearPlayRetry();_ttsAudio=null;if(onerror)onerror();else if(onend)onend();};
    function fail(){
      clearPlayRetry();
      _ttsAudio=null;
      if(onerror)onerror();else if(onend)onend();
    }
    function tryPlay(){
      var p=a.play();
      if(p&&typeof p.catch==='function'){
      p.catch(function(){
        if(_ttsAudio!==a)return;
        // Autoplay blocked: retry on first user gesture without skipping this segment
        function retry(){
          document.removeEventListener('click',retry,true);
          document.removeEventListener('touchstart',retry,true);
          _ttsPlayRetryRem=null;
          if(_ttsAudio!==a)return;
          var p2=a.play();
          if(p2&&typeof p2.catch==='function')p2.catch(fail);
        }
        document.addEventListener('click',retry,{capture:true});
        document.addEventListener('touchstart',retry,{capture:true});
        _ttsPlayRetryRem=function(){
          document.removeEventListener('click',retry,true);
          document.removeEventListener('touchstart',retry,true);
        };
      });
      }
    }
    tryPlay();
  }
  if(_ttsCache[txt]){play(_ttsCache[txt]);return;}
  fetch('https://tts.mathufo.com/tts',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({data:[txt],voice_name:'zh_male_tiancaitongsheng_mars_bigtts'})
  }).then(function(r){return r.json();})
  .then(function(j){
    if(j.error||!j.data||!j.data[0]){if(onerror)onerror();else if(onend)onend();return;}
    var url='https://cdn.mathufo.com/sound/'+j.data[0];
    _ttsCache[txt]=url;
    play(url);
  }).catch(function(){if(onerror)onerror();else if(onend)onend();});
}

function ttsCancel(){
  if(_ttsPlayRetryRem){_ttsPlayRetryRem();_ttsPlayRetryRem=null;}
  if(_ttsAudio){_ttsAudio.pause();_ttsAudio=null;}
}

// Resume auto-read after user reveals the waited segment
function resumeAutoRead(){
  if(!_readPaused)return;
  var gen=_readGen;
  _readPaused=false; _readWaitGroup=null;
  _readIdx++;
  setTimeout(function(){if(gen===_readGen)readNextSeg();},300);
}

function activatePreBtns(segId, waitFor){
  var segEl = segId ? document.getElementById('rseg-'+segId) : null;
  var sc = document.getElementById('stemContent');
  var container = segEl || sc;
  if(!container) return;
  container.querySelectorAll('[data-grp]').forEach(function(el){
    var grp = el.getAttribute('data-grp');
    if(!grp) return;
    el.classList.remove('pre');
    el.style.cursor = 'pointer';
    el.style.pointerEvents = 'auto';
    // use setAttribute onclick to avoid duplicate listeners after re-render
    el.setAttribute('onclick', "doReveal('"+grp+"')");
    // Pulse every still-hidden control in this segment (not only waitFor); narration still waits for waitFor to continue
    if(waitFor===null) el.classList.add('pending');
    else if(!st[grp]) el.classList.add('pending');
  });
}

function activateBtnPulse(group){
  var sc=document.getElementById('stemContent');
  if(!sc)return;
  sc.querySelectorAll('[onclick],[data-grp]').forEach(function(el){
    var oc=el.getAttribute('onclick')||'';
    var grp=el.getAttribute('data-grp')||'';
    if(oc.indexOf("'"+group+"'")!==-1||oc.indexOf('"'+group+'"')!==-1||grp===group){
      el.classList.add('pending');
    }
  });
}

function deactivateBtnPulse(group){
  var sc=document.getElementById('stemContent');
  if(!sc)return;
  sc.querySelectorAll('.pending').forEach(function(el){
    var oc=el.getAttribute('onclick')||'';
    var grp=el.getAttribute('data-grp')||'';
    if(oc.indexOf("'"+group+"'")!==-1||oc.indexOf('"'+group+'"')!==-1||grp===group){
      el.classList.remove('pending');
    }
  });
}

function speak(txt){
  ttsCancel();
  var b=document.getElementById('speakerBtn');
  if(b)b.classList.add('speaking');
  ttsSpeak(txt, function(){if(b)b.classList.remove('speaking');}, function(){if(b)b.classList.remove('speaking');});
}

function shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}

function spk(txt){return '<button class="speaker-btn" id="speakerBtn" onclick="speak(\''+txt.replace(/'/g,"\\'")+'\')" title="朗读题目"><svg viewBox="0 0 24 24" fill="none" stroke="#8B5A00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>';}

function hlbtn(cls,grp,txt,revealed){var c=cls+(revealed?' revealed':'');return '<span class="'+c+'" onclick="doReveal(\''+grp+'\')">'+txt+'</span>';}
function hlbtnPre(cls,grp,txt,revealed){
  // pre: revealed style but not yet clickable; becomes normal hlbtn after seg is read
  if(revealed)return '<span class="'+cls+' revealed">'+txt+'</span>';
  return '<span class="'+cls+' pre" data-grp="'+grp+'">'+txt+'</span>';
}
function seg(id,content){return '<span class="read-seg" id="rseg-'+id+'">'+content+'</span>';}

function launchConfetti(){
  var colors=['#FFD94A','#FF9F50','#5CB85C','#4FC3F7','#F48FB1','#CE93D8'];
  var el=document.getElementById('confetti');
  for(var i=0;i<70;i++){
    var p=document.createElement('div');p.className='confetti-piece';
    var s=6+Math.random()*9;
    p.style.cssText='left:'+Math.random()*100+'%;width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+(Math.random()>.5?'50%':'3px')+';animation-duration:'+(1.2+Math.random()*1.6)+'s;animation-delay:'+Math.random()*.5+'s';
    el.appendChild(p);
  }
  setTimeout(function(){el.innerHTML='';},3200);
}

var cQ=0,st={};
function initSt(i){
  var q=QUESTIONS[i];
  var opts=q.isMultiStep?[]:shuffle(q.options.slice());
  return{A:false,B:false,C:false,D:false,E:false,merge:false,placed:[],done:false,opts:opts,msStep:0,msAllDone:false};
}

function doReveal(group){
  var q=QUESTIONS[cQ];
  q.revealFn(group,st);
  if(q.stemFn){
    document.getElementById('stemContent').innerHTML=q.stemFn(st);
    // re-activate all segments that have already been read
    if(q.readSegments){
      for(var i=0;i<_readIdx;i++){
        var s=q.readSegments[i];
        if(s.segId) activatePreBtns(s.segId, null);
      }
      // re-apply pending to current waiting segment
      if(_readPaused&&_readWaitGroup){
        var cur=q.readSegments[_readIdx];
        if(cur&&cur.segId) activatePreBtns(cur.segId, _readWaitGroup);
      }
    } else {
      if(_readPaused&&_readWaitGroup) activateBtnPulse(_readWaitGroup);
    }
  }
  // resume auto-read if this reveal unblocks the waiting segment
  if(_readPaused){
    var waitSeg=_readSegs[_readIdx];
    if(waitSeg&&waitSeg.waitFor===group){
      deactivateBtnPulse(group);
      resumeAutoRead();
    }
  }
  // for multistep q4: showMSQuestion is triggered by merge animation end, not here
}

var uidCtr=0;
function place(chip){
  if(st.done)return;
  var q=QUESTIONS[cQ];
  if(q.isMultiStep){var step=q.steps[st.msStep];if(!step||st.msAllDone)return;}
  var bar=document.getElementById('answerBar');
  placeAtIndex(chip, bar.querySelectorAll('.chip-placed').length);
}

function removeChip(span,chip){
  if(st.done)return;
  span.style.animation='popOut .18s forwards';
  setTimeout(function(){
    span.remove();
    if(chip)chip.classList.remove('used');
    var bar=document.getElementById('answerBar');
    // re-sync placed from DOM order
    st.placed=Array.from(bar.querySelectorAll('.chip-placed')).map(function(s){return s.dataset.val;});
    if(!bar.querySelector('.chip-placed'))bar.classList.remove('has-content');
    var sb=document.getElementById('submitBtn');if(sb)sb.classList.remove('ready');
    sndRemove();
  },170);
}

function submitAnswer(){
  var sb=document.getElementById('submitBtn');
  if(sb)sb.classList.remove('ready');
  evaluate();
}

// Compare two sequences with commutative law for ＋ and ×
function normalizeSeq(seq){
  // Split into segments separated by ＝, normalize each segment's operands
  var result=[];
  var i=0;
  while(i<seq.length){
    if(seq[i]==='＝'){result.push('＝');i++;continue;}
    // collect a run of terms connected by ＋ or ×
    var terms=[seq[i]];
    var ops=[];
    i++;
    while(i<seq.length&&(seq[i]==='＋'||seq[i]==='×')){
      ops.push(seq[i]);i++;
      if(i<seq.length){terms.push(seq[i]);i++;}
    }
    if(ops.length>0&&ops.every(function(o){return o===ops[0];})){
      // all same commutative op: sort terms
      var op=ops[0];
      terms=terms.slice().sort();
      for(var j=0;j<terms.length;j++){result.push(terms[j]);if(j<ops.length)result.push(op);}
    } else {
      // mixed ops or single term: keep as-is
      for(var j=0;j<terms.length;j++){result.push(terms[j]);if(j<ops.length)result.push(ops[j]);}
    }
  }
  return result.join('|');
}

function seqMatch(placed, valid){
  if(placed.length!==valid.length)return false;
  return normalizeSeq(placed)===normalizeSeq(valid);
}

function evaluate(){
  if(QUESTIONS[cQ].isMultiStep){evaluateMS();return;}
  var q=QUESTIONS[cQ];
  var ok=q.valid.some(function(seq){return seqMatch(st.placed,seq);});
  var fb=document.getElementById('feedback'),nb=document.getElementById('nextBtn');
  if(ok){
    st.done=true;fb.textContent=q.successMsg;fb.className='feedback show correct';
    sndCorrect();launchConfetti();bounceAll();
    if(cQ<QUESTIONS.length-1&&nb)nb.classList.add('visible');
  }else{
    fb.textContent='再想想～检查一下算式吧！';fb.className='feedback show wrong';sndWrong();
    var sb=document.getElementById('submitBtn');if(sb)sb.classList.add('ready');
    setTimeout(function(){if(fb.classList.contains('wrong'))fb.className='feedback';},2500);
  }
}

function resetQ(){
  var q=QUESTIONS[cQ];st=initSt(cQ);
  document.getElementById('answerBar').innerHTML='';
  document.getElementById('answerBar').classList.remove('has-content');
  document.getElementById('feedback').className='feedback';document.getElementById('feedback').textContent='';
  var nb=document.getElementById('nextBtn');if(nb)nb.classList.remove('visible');
  var sb=document.getElementById('submitBtn');if(sb)sb.classList.remove('ready');
  document.getElementById('interactArea').classList.add('locked');
  document.getElementById('sceneArea').innerHTML=q.sceneFn();
  if(q.isMultiStep){
    var rec=document.getElementById('stepRecord');if(rec)rec.innerHTML='';
    st.msStep=0;st.msAllDone=false;
    renderMSStep();
  } else {
    document.getElementById('stemContent').innerHTML=q.stemFn(st);
    renderOpts();
  }
}

function nextQ(){cQ++;if(cQ<QUESTIONS.length)renderQ(cQ);}

function renderMSStep(){
  var q=QUESTIONS[cQ];
  var step=q.steps[st.msStep];
  var bar=document.getElementById('answerBar');bar.innerHTML='';bar.classList.remove('has-content');
  var fb=document.getElementById('feedback');fb.className='feedback';fb.textContent='';
  st.placed=[];st.done=false;
  var sq=document.getElementById('stepQuestion');if(sq)sq.innerHTML='';
  document.getElementById('optionsRow').innerHTML='';
  document.getElementById('interactArea').classList.add('locked');
  // trigger any scene reveals for this step
  if(step.revealGroups&&step.revealGroups.length>0){
    step.revealGroups.forEach(function(g){q.revealFn(g,st);});
  }
  // show question (with speaker) immediately
  showMSQuestion();
}

function showMSQuestion(){
  var q=QUESTIONS[cQ];
  var step=q.steps[st.msStep];
  // guard against double-call (e.g. from both readNextSeg and merge animation end)
  if(st._showingQuestion)return;
  st._showingQuestion=true;

  var sq=document.getElementById('stepQuestion');
  var bar=document.getElementById('answerBar');
  var row=document.getElementById('optionsRow');
  var ia=document.getElementById('interactArea');
  if(sq){sq.innerHTML='';sq.classList.remove('show');}
  if(bar){bar.innerHTML='';bar.classList.remove('has-content','ms-show');}
  if(row){row.innerHTML='';row.classList.remove('ms-show');}
  // keep interactArea locked until speech done

  st.opts=shuffle(step.options.slice());

  setTimeout(function(){
    if(!sq)return;
    var readTxt=step.readText||step.question;
    var btn=document.createElement('button');
    btn.className='speaker-btn';btn.title='重播';btn.id='stepSpeakerBtn';
    btn.style.cssText='display:inline-flex;vertical-align:middle;margin-right:6px;position:relative;top:-1px;flex-shrink:0;';
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#1A4080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
    btn.onclick=function(){speakStep(readTxt);};
    sq.appendChild(btn);
    sq.appendChild(document.createTextNode(step.question));
    sq.classList.add('show');

    ttsCancel();
    btn.classList.add('speaking');
    function afterSpeech(){
      btn.classList.remove('speaking');
      if(ia)ia.classList.remove('locked');
      showBarAndOptions(bar,row);
    }
    ttsSpeak(readTxt, afterSpeech, afterSpeech);
  },300);
}

function showBarAndOptions(bar,row){
  // show answer bar
  setTimeout(function(){
    var secTitle=document.querySelector('#interactArea .section-title');
    if(secTitle){secTitle.style.animation='fadeSlideIn .4s ease forwards';secTitle.style.opacity='0';}
    if(bar)bar.classList.add('ms-show');
  },200);
  // show options
  setTimeout(function(){
    var q=QUESTIONS[cQ];
    if(!row)return;
    if(st.opts.length>6){row.classList.add('compact');if(bar)bar.classList.add('compact');}
    else{row.classList.remove('compact');if(bar)bar.classList.remove('compact');}
    st.opts.forEach(function(val){
      var d=document.createElement('div');d.className='chip';d.dataset.val=val;d.textContent=val;
      var uid=uidCtr++;d.dataset.uid=uid;
      (function(dd){dd.onclick=function(){place(dd);};})(d);
      setupDrag(d);row.appendChild(d);
    });
    row.classList.add('ms-show');
  },600);
}

function speakStep(txt){
  ttsCancel();
  var btn=document.getElementById('stepSpeakerBtn');
  if(btn)btn.classList.add('speaking');
  ttsSpeak(txt, function(){if(btn)btn.classList.remove('speaking');}, function(){if(btn)btn.classList.remove('speaking');});
}

function evaluateMS(){
  var q=QUESTIONS[cQ];
  var step=q.steps[st.msStep];
  var ok=step.valid.some(function(seq){return seqMatch(st.placed,seq);});
  var fb=document.getElementById('feedback');
  if(ok){
    st.done=true;
    fb.textContent='✓ '+step.successText;fb.className='feedback show correct';
    sndCorrect();
    // 1. 先撒花庆祝
    launchConfetti();
    // 2. 1秒后chip飞走
    setTimeout(function(){
      var bar=document.getElementById('answerBar');
      if(bar){
        var chips=bar.querySelectorAll('.chip-placed');
        chips.forEach(function(c,i){
          c.style.animation='chipFlyUp 0.35s ease '+(i*55)+'ms forwards';
        });
      }
      // 3. chip飞完后文字淡入，然后清场
      setTimeout(function(){
        var rec=document.getElementById('stepRecord');
        if(rec){
          var div=document.createElement('div');div.className='step-done';
          div.textContent=(st.msStep+1)+'）'+step.successText;
          rec.appendChild(div);
          requestAnimationFrame(function(){requestAnimationFrame(function(){div.classList.add('show');});});
        }
        setTimeout(function(){
          st.msStep++;
          st._showingQuestion=false;
          if(st.msStep<q.steps.length){
            var sc=document.getElementById('stemContent');
            if(sc&&q.stemFn)sc.innerHTML=q.stemFn(st);
            document.getElementById('answerBar').innerHTML='';
            document.getElementById('answerBar').classList.remove('has-content');
            document.getElementById('optionsRow').innerHTML='';
            var sq2=document.getElementById('stepQuestion');if(sq2)sq2.innerHTML='';
            document.getElementById('interactArea').classList.add('locked');
            fb.className='feedback';fb.textContent='';
            st.placed=[];st.done=false;
            var sb=document.getElementById('submitBtn');if(sb)sb.classList.remove('ready');
            showMSQuestion();
          } else {
            st.msAllDone=true;
            var nb=document.getElementById('nextBtn');if(nb)nb.classList.add('visible');
            var sq=document.getElementById('stepQuestion');if(sq)sq.textContent='全部完成！大马5天后追上小马！';
            document.getElementById('optionsRow').innerHTML='';
            document.getElementById('answerBar').innerHTML='';
          }
        },500);
      },400);
    },1000);
  } else {
    fb.textContent='再想想～检查一下算式吧！';fb.className='feedback show wrong';sndWrong();
    var sb=document.getElementById('submitBtn');if(sb)sb.classList.add('ready');
    setTimeout(function(){if(fb.classList.contains('wrong'))fb.className='feedback';},2500);
  }
}
function renderOpts(){
  var row=document.getElementById('optionsRow');row.innerHTML='';
  var bar=document.getElementById('answerBar');
  if(st.opts.length>6){row.classList.add('compact');if(bar)bar.classList.add('compact');}
  else{row.classList.remove('compact');if(bar)bar.classList.remove('compact');}
  st.opts.forEach(function(val){
    var d=document.createElement('div');d.className='chip';d.dataset.val=val;d.textContent=val;
    var uid=uidCtr++;d.dataset.uid=uid;
    (function(dd){dd.onclick=function(){place(dd);};})(d);
    setupDrag(d);row.appendChild(d);
  });
}

// ── drag helpers ──────────────────────────────────────────
var _dragCaret=null; // the insert-position indicator in answerBar

function getInsertIndex(bar, ex){
  var chips=Array.from(bar.querySelectorAll('.chip-placed'));
  for(var i=0;i<chips.length;i++){
    var r=chips[i].getBoundingClientRect();
    if(ex < r.left + r.width/2) return i;
  }
  return chips.length;
}

function showCaret(bar, ex){
  if(!_dragCaret){
    _dragCaret=document.createElement('div');
    _dragCaret.style.cssText='width:3px;background:#4A90D9;border-radius:2px;height:32px;flex-shrink:0;pointer-events:none;transition:none;';
    _dragCaret.id='dragCaret';
  }
  var idx=getInsertIndex(bar,ex);
  var chips=Array.from(bar.querySelectorAll('.chip-placed'));
  if(idx>=chips.length){
    bar.appendChild(_dragCaret);
  } else {
    bar.insertBefore(_dragCaret,chips[idx]);
  }
}

function removeCaret(){
  if(_dragCaret&&_dragCaret.parentNode)_dragCaret.parentNode.removeChild(_dragCaret);
}

function placeAtIndex(chip, idx){
  if(st.done)return;
  var val=chip.dataset.val;
  var bar=document.getElementById('answerBar');
  var span=document.createElement('span');
  span.className='chip-placed';span.textContent=chip.textContent;span.dataset.val=val;
  var uid=chip.dataset.uid;span.dataset.uid=uid;
  (function(s,c){s.onclick=function(){removeChip(s,c);};})(span,chip);
  setupPlacedDrag(span, chip);

  var chips=Array.from(bar.querySelectorAll('.chip-placed'));
  if(idx>=chips.length){bar.appendChild(span);}
  else{bar.insertBefore(span,chips[idx]);}
  bar.classList.add('has-content');

  // sync st.placed to bar order
  st.placed=Array.from(bar.querySelectorAll('.chip-placed')).map(function(s){return s.dataset.val;});
  chip.classList.add('used');

  // read chip text
  var txt=chip.textContent.replace(/[（）()【】\[\]]/g,'').trim();
  txt=txt.replace(/只/g,'支').replace(/＋/g,'加').replace(/－/g,'减').replace(/×/g,'乘以').replace(/÷/g,'除以').replace(/＝/g,'等于');
  if(txt)ttsSpeak(txt,null,null);
  sndPlace();

  var q=QUESTIONS[cQ];
  var optLen=q.isMultiStep?q.steps[st.msStep].options.length:q.options.length;
  var sb=document.getElementById('submitBtn');
  if(sb&&st.placed.length===optLen)sb.classList.add('ready');
}

// drag for source chips (from optionsRow)
function setupDrag(chip){
  var ghost=null,_sx=0,_sy=0,_started=false;
  function mv(ex,ey){
    if(!_started){
      if(Math.sqrt((ex-_sx)*(ex-_sx)+(ey-_sy)*(ey-_sy))<6)return;
      _started=true;
      ghost=document.createElement('div');ghost.className='drag-ghost';ghost.textContent=chip.textContent;
      ghost.style.left=(ex-ghost.offsetWidth/2)+'px';ghost.style.top=(ey-ghost.offsetHeight/2)+'px';
      document.body.appendChild(ghost);
      chip.classList.add('dragging');
    }
    ghost.style.left=(ex-ghost.offsetWidth/2)+'px';ghost.style.top=(ey-ghost.offsetHeight/2)+'px';
    var bar=document.getElementById('answerBar');
    var r=bar.getBoundingClientRect();
    var over=ex>=r.left&&ex<=r.right&&ey>=r.top&&ey<=r.bottom;
    bar.classList.toggle('drag-over',over);
    if(over)showCaret(bar,ex); else removeCaret();
  }
  function end(ex,ey){
    var bar=document.getElementById('answerBar');
    if(ghost){ghost.remove();ghost=null;chip.classList.remove('dragging');bar.classList.remove('drag-over');
      var r=bar.getBoundingClientRect();
      var over=ex>=r.left&&ex<=r.right&&ey>=r.top&&ey<=r.bottom;
      removeCaret();
      if(over&&!chip.classList.contains('used'))placeAtIndex(chip,getInsertIndex(bar,ex));
    }
    _started=false;
    document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
    document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te);
  }
  function mm(e){mv(e.clientX,e.clientY);}
  function mu(e){end(e.clientX,e.clientY);}
  function tm(e){e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);}
  function te(e){var t=e.changedTouches[0];end(t.clientX,t.clientY);}
  function startDrag(ex,ey){
    if(chip.classList.contains('used')||st.done)return;
    _sx=ex;_sy=ey;_started=false;ghost=null;
  }
  chip.addEventListener('mousedown',function(e){startDrag(e.clientX,e.clientY);document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  chip.addEventListener('touchstart',function(e){var t=e.touches[0];startDrag(t.clientX,t.clientY);document.addEventListener('touchmove',tm,{passive:false});document.addEventListener('touchend',te);},{passive:true});
}

// drag for placed chips (re-order within answerBar)
function setupPlacedDrag(span, sourceChip){
  var ghost=null;
  var origIdx=-1;
  function mv(ex,ey){
    if(!ghost)return;
    ghost.style.left=(ex-ghost.offsetWidth/2)+'px';ghost.style.top=(ey-ghost.offsetHeight/2)+'px';
    var bar=document.getElementById('answerBar');
    var r=bar.getBoundingClientRect();
    if(ex>=r.left&&ex<=r.right&&ey>=r.top&&ey<=r.bottom)showCaret(bar,ex);
    else removeCaret();
  }
  function end(ex,ey){
    if(!ghost)return;ghost.remove();ghost=null;
    var bar=document.getElementById('answerBar');
    var r=bar.getBoundingClientRect();
    var over=ex>=r.left&&ex<=r.right&&ey>=r.top&&ey<=r.bottom;
    removeCaret();
    if(over){
      var newIdx=getInsertIndex(bar,ex);
      span.remove();
      var chips=Array.from(bar.querySelectorAll('.chip-placed'));
      if(newIdx>=chips.length)bar.appendChild(span);
      else bar.insertBefore(span,chips[newIdx]);
      st.placed=Array.from(bar.querySelectorAll('.chip-placed')).map(function(s){return s.dataset.val;});
    } else {
      // dragged off bar: remove and restore source chip
      span.style.animation='popOut .18s forwards';
      setTimeout(function(){
        span.remove();
        if(!bar.querySelector('.chip-placed'))bar.classList.remove('has-content');
        if(sourceChip)sourceChip.classList.remove('used');
        st.placed=Array.from(bar.querySelectorAll('.chip-placed')).map(function(s){return s.dataset.val;});
        var sb=document.getElementById('submitBtn');if(sb)sb.classList.remove('ready');
        sndRemove();
      },170);
    }
    document.removeEventListener('mousemove',mm2);document.removeEventListener('mouseup',mu2);
    document.removeEventListener('touchmove',tm2);document.removeEventListener('touchend',te2);
  }
  function mm2(e){mv(e.clientX,e.clientY);}
  function mu2(e){end(e.clientX,e.clientY);}
  function tm2(e){e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);}
  function te2(e){var t=e.changedTouches[0];end(t.clientX,t.clientY);}
  function startDrag(ex,ey){
    if(st.done)return;
    var bar=document.getElementById('answerBar');
    var chips=Array.from(bar.querySelectorAll('.chip-placed'));
    origIdx=chips.indexOf(span);
    // delay ghost creation until actual movement
    _dragStartX=ex;_dragStartY=ey;_dragStarted=false;
    ghost=null;
  }
  var _dragStartX=0,_dragStartY=0,_dragStarted=false;
  function mv(ex,ey){
    if(!_dragStarted){
      var dx=ex-_dragStartX,dy=ey-_dragStartY;
      if(Math.sqrt(dx*dx+dy*dy)<6)return;
      _dragStarted=true;
      ghost=document.createElement('div');ghost.className='drag-ghost';ghost.textContent=span.textContent;
      ghost.style.left=(ex-ghost.offsetWidth/2)+'px';ghost.style.top=(ey-ghost.offsetHeight/2)+'px';
      document.body.appendChild(ghost);
    }
    ghost.style.left=(ex-ghost.offsetWidth/2)+'px';ghost.style.top=(ey-ghost.offsetHeight/2)+'px';
    var bar=document.getElementById('answerBar');
    var r=bar.getBoundingClientRect();
    if(ex>=r.left&&ex<=r.right&&ey>=r.top&&ey<=r.bottom)showCaret(bar,ex);
    else removeCaret();
  }
  function end(ex,ey){
    if(!_dragStarted){
      document.removeEventListener('mousemove',mm2);document.removeEventListener('mouseup',mu2);
      document.removeEventListener('touchmove',tm2);document.removeEventListener('touchend',te2);
      return;
    }
    if(ghost){ghost.remove();ghost=null;}
    var bar=document.getElementById('answerBar');
    var r=bar.getBoundingClientRect();
    var over=ex>=r.left&&ex<=r.right&&ey>=r.top&&ey<=r.bottom;
    removeCaret();
    if(over){
      var newIdx=getInsertIndex(bar,ex);
      span.remove();
      var chips=Array.from(bar.querySelectorAll('.chip-placed'));
      if(newIdx>=chips.length)bar.appendChild(span);
      else bar.insertBefore(span,chips[newIdx]);
      st.placed=Array.from(bar.querySelectorAll('.chip-placed')).map(function(s){return s.dataset.val;});
    } else {
      span.style.animation='popOut .18s forwards';
      setTimeout(function(){
        span.remove();
        if(!bar.querySelector('.chip-placed'))bar.classList.remove('has-content');
        if(sourceChip)sourceChip.classList.remove('used');
        st.placed=Array.from(bar.querySelectorAll('.chip-placed')).map(function(s){return s.dataset.val;});
        var sb=document.getElementById('submitBtn');if(sb)sb.classList.remove('ready');
        sndRemove();
      },170);
    }
    document.removeEventListener('mousemove',mm2);document.removeEventListener('mouseup',mu2);
    document.removeEventListener('touchmove',tm2);document.removeEventListener('touchend',te2);
  }
  function mm2(e){mv(e.clientX,e.clientY);}
  function mu2(e){end(e.clientX,e.clientY);}
  function tm2(e){e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);}
  function te2(e){var t=e.changedTouches[0];end(t.clientX,t.clientY);}
  span.addEventListener('mousedown',function(e){e.stopPropagation();startDrag(e.clientX,e.clientY);document.addEventListener('mousemove',mm2);document.addEventListener('mouseup',mu2);});
  span.addEventListener('touchstart',function(e){e.stopPropagation();var t=e.touches[0];startDrag(t.clientX,t.clientY);document.addEventListener('touchmove',tm2,{passive:false});document.addEventListener('touchend',te2);},{passive:true});
}

function renderQ(idx){
  cQ=idx;var q=QUESTIONS[idx];st=initSt(idx);
  var root=document.getElementById('appRoot');
  var isMS=q.isMultiStep;
  var interactInner=isMS
    ? '<div id="stepRecord" class="step-record"></div>'+
      '<div><div class="step-question" id="stepQuestion"></div></div>'+
      '<div><div class="section-title">列算式</div><div class="answer-bar" id="answerBar"></div></div>'+
      '<div><div class="options-row" id="optionsRow"></div></div>'
    : '<div><div class="section-title">列算式</div><div class="answer-bar" id="answerBar"></div></div>'+
      '<div><div class="options-row" id="optionsRow"></div></div>';
  root.innerHTML=
    '<div class="stem">'+
    '<div class="stem-tag">'+q.tag+'</div>'+
    (idx<QUESTIONS.length-1?'<button class="stem-nav" onclick="nextQ()" title="下一题"><svg viewBox="0 0 24 24" fill="none" stroke="#8B5A00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>':'')+
    '<div class="stem-text" id="stemContent">'+(isMS&&q.stemFn?q.stemFn(st):isMS?q.stemBase:q.stemFn(st))+'</div>'+
    '</div>'+
    '<div class="scene" id="sceneArea">'+q.sceneFn()+'</div>'+
    '<div class="interact locked" id="interactArea">'+
    interactInner+
    '<div>'+
    '<div class="feedback-area"><div class="feedback" id="feedback"></div></div>'+
    '<div class="btn-row">'+
    '<button class="reset-btn" onclick="resetQ()">↺ 重置</button>'+
    '<button class="submit-btn" id="submitBtn" onclick="submitAnswer()">提交</button>'+
    '<button class="next-btn" id="nextBtn" onclick="nextQ()">'+(idx<QUESTIONS.length-1?'下一题 →':'完成 ✓')+'</button>'+
    '</div></div>'+
    '</div>';
  if(isMS){
    st.msStep=0;st.msAllDone=false;
    // if has readSegments, autoread will trigger showMSQuestion when done
    if(!q.readSegments) renderMSStep();
  } else {
    renderOpts();
  }
  startAutoRead();
}

renderQ(0);
// start background music on first user interaction
function _tryStartMusic(){startBgMusic();}
document.addEventListener('click', function startMusic(){_tryStartMusic();document.removeEventListener('click',startMusic);},{once:true});
document.addEventListener('touchstart', function startMusicT(){_tryStartMusic();document.removeEventListener('touchstart',startMusicT);},{once:true});
</script>
