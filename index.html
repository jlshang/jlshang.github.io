<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #e8f4ec 0%, #d4e8f0 50%, #e8e4f4 100%);
      color: #1a2a24;
    }
    h1 {
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .sub {
      font-size: 0.9rem;
      color: #4a6056;
      margin-bottom: 28px;
    }
    nav {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a.card {
      display: block;
      padding: 18px 20px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      text-decoration: none;
      color: #1a4080;
      font-weight: 600;
      font-size: 1.05rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.12);
    }
    a.card:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 3px;
    }
    a.card span.path {
      display: block;
      margin-top: 6px;
      font-size: 0.8rem;
      font-weight: 400;
      color: #6a7a88;
      font-family: ui-monospace, monospace;
    }
    footer {
      margin-top: 36px;
      font-size: 0.75rem;
      color: #7a9088;
    }
  </style>
</head>
<body>
  <h1>目录</h1>
  <p class="sub">选择要打开的页面</p>
  <nav aria-label="Site pages">
    <a class="card" href="zome.html">
      教材同步拼
    </a>
    <a class="card" href="word_problems.html">
      word_problems
    </a>
  </nav>
  <footer>GitHub Pages</footer>
</body>
</html>
