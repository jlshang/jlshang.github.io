<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>应用题闯关</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EEE9E0;
  --card: #FFFDF8;
  --q-bg: #FEF8EA;
  --q-border: #EED898;
  --bottom-bg: #F8F5EE;
  --coral: #E06830;
  --amber: #E8A000;
  --teal: #38B880;
  --purple: #6858E8;
  --text: #382818;
  --text-mid: #786858;
  --text-soft: #B8A898;
  --border: #E8DCC8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center;padding:20px 16px 40px;}
.phone{width:100%;max-width:360px;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 4px 14px;}
.level-tag{font-size:12px;font-weight:700;padding:6px 18px;border-radius:20px;letter-spacing:1px;}
.tag-1{background:#FFE0CC;color:#B03800;}
.tag-2{background:#CCEEDC;color:#186840;}
.tag-3{background:#E0DCFF;color:#3828A8;}
.dots{display:flex;gap:6px;align-items:center;}
.dot{width:8px;height:8px;border-radius:50%;background:#C8C0B0;transition:all 0.3s;}
.dot.active{width:22px;border-radius:5px;}
.dot.d1.active{background:var(--coral);}
.dot.d2.active{background:var(--teal);}
.dot.d3.active{background:var(--purple);}
.dot.done{background:var(--teal);}

.main-card{background:var(--card);border-radius:28px;overflow:hidden;box-shadow:0 2px 16px rgba(80,60,20,0.12);}

/* Q SECTION */
.q-section{background:var(--q-bg);padding:16px 18px 14px;border-bottom:1.5px dashed var(--q-border);}
.q-tag-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.q-badge{font-size:11px;font-weight:700;background:var(--amber);color:white;padding:4px 12px;border-radius:20px;letter-spacing:1px;}
.q-row{display:flex;align-items:flex-start;gap:10px;}
.spk-wrap{flex-shrink:0;margin-top:4px;position:relative;width:32px;height:32px;}
.spk-ring{display:none;}
/* speaker button: fixed circle, icon breathes when reading */
.spk-btn{width:32px;height:32px;border-radius:50%;background:transparent;border:2px solid var(--amber);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:opacity 0.12s;}
.spk-btn:active{opacity:0.6;}
.spk-btn svg{width:16px;height:16px;transition:transform 0.2s,opacity 0.2s;}
.spk-btn.reading svg{animation:iconBreath 0.8s ease-in-out infinite;}
@keyframes iconBreath{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:0.6}}

.q-text{font-family:'Ma Shan Zheng',cursive;font-size:18px;color:var(--text);line-height:2.5;flex:1;}
.seg{border-radius:8px;padding:2px 4px;transition:background 0.25s;display:inline-block;vertical-align:middle;font-family:'Ma Shan Zheng',cursive;font-size:17px;line-height:1.7;}
.seg.lit{background:#FFD060;}

/* unified kw button — all same shape, color-coded */
.kw{display:inline-block;font-family:'Ma Shan Zheng',cursive;font-size:17px;border-radius:8px;padding:2px 8px;user-select:none;vertical-align:middle;transition:transform 0.15s,box-shadow 0.15s,opacity 0.2s;line-height:1.7;}
.kw.as-text{background:transparent;color:var(--text);cursor:default;border:none;}
.kw.as-text.lit{background:#FFD060;}
.kw.wrong-shake{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* active states: breathing + color, no heavy shadow */
@keyframes kwBob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.05)}}
.kw.active-num1{background:#FFD8D8;color:#900000;cursor:pointer;border:1.5px solid #E08080;animation:kwBob 1s ease-in-out infinite;}
.kw.active-num2{background:#E4DEFF;color:#300098;cursor:pointer;border:1.5px solid #9080E0;animation:kwBob 1s ease-in-out infinite;}
.kw.active-q{background:#FFF0A8;color:#705000;cursor:pointer;border:1.5px solid #D0A000;animation:kwBob 1s ease-in-out infinite;}
.kw.wrong-kw{background:#FFD8D8;color:#900000;cursor:pointer;border:1.5px solid #E08080;animation:kwBob 1s ease-in-out infinite;}
/* wrong-dog: purple dashed, breathing */
.kw.wrong-dog{background:#E4DEFF;color:#300098;cursor:pointer;border:1.5px solid #9080E0;animation:kwBob 1s ease-in-out infinite;}
.kw.wrong-kw:active,.kw.wrong-dog:active{transform:scale(0.93);animation:none;}
.kw.active-num1:active,.kw.active-num2:active,.kw.active-q:active{transform:translateY(2px);animation:none;}

/* done states */
.kw.done-num1{background:#FFD8D8;color:#900000;cursor:default;animation:none;border:none;}
.kw.done-num2{background:#E4DEFF;color:#300098;cursor:default;animation:none;border:none;}
.kw.done-q{background:#FFF0A8;color:#705000;cursor:default;animation:none;border:none;}

/* VOICE */
.voice-row{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--q-bg);border-bottom:1.5px dashed var(--q-border);min-height:44px;}
.replay-btn{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1.5px solid #E8C070;background:#FEF3DC;color:#A07000;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.2s,transform 0.12s;opacity:0.7;}
.replay-btn:active{transform:scale(0.88);opacity:1;}
.chick{font-size:18px;flex-shrink:0;}
.v-text{font-size:13px;color:var(--text-mid);line-height:1.5;}

/* L1/L3 SCENE */
.scene-section{background:#FAFAF7;min-height:190px;padding:14px 18px 14px;border-bottom:1px solid var(--border);position:relative;display:flex;flex-direction:column;gap:0;justify-content:flex-start;}
.scene-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.scene-ph-txt{font-size:12px;color:#C0B0A0;background:#F0ECE4;padding:6px 16px;border-radius:20px;}
.flower-row{display:flex;align-items:flex-start;gap:8px;opacity:0;transition:opacity 0.35s;padding:8px 0 4px;}
.flower-row.show{opacity:1;}
.row-lbl{font-size:11px;color:var(--text-soft);width:28px;flex-shrink:0;text-align:right;padding-top:5px;}
.flowers{display:flex;gap:5px;align-items:flex-start;flex-wrap:wrap;flex:1;}
.flower-svg{width:26px;height:26px;opacity:0;transform:scale(0.2) rotate(-30deg);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;display:block;}
.flower-svg.show{opacity:1;transform:scale(1) rotate(0deg);}
/* scene highlight overlays for opt selection */
.scene-hl-ring{position:absolute;inset:-4px;border-radius:50%;border:2px dashed #E84848;pointer-events:none;opacity:0;}
.scene-hl-ring.red{border-color:#E84848;}
.scene-hl-ring.purple{border-color:#6858E8;}
.scene-hl-ring.flash-red{animation:hlFlash 1s ease-in-out 3;}
.scene-hl-ring.flash-purple{animation:hlFlashPurple 1s ease-in-out 3;}
@keyframes hlFlash{0%,100%{opacity:0}40%,60%{opacity:1}}
@keyframes hlFlashPurple{0%,100%{opacity:0}40%,60%{opacity:1}}
.flower-svg.breathe-yellow{animation:breatheY 1s ease-in-out 3;}
.flower-extra-wrap.breathe-yellow-wrap{animation:breatheY 1s ease-in-out 3;}
@keyframes breatheY{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.25) rotate(0deg)}}
.flower-extra-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;flex-shrink:0;opacity:0;transform:scale(0.2) rotate(-30deg);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.flower-extra-wrap.show{opacity:1;transform:scale(1) rotate(0deg);}
.flower-extra-ring{position:absolute;inset:-3px;border-radius:50%;border:2px dashed #6858E8;pointer-events:none;}
.flower-extra-ring.flash{animation:ringFlash 0.6s ease-in-out infinite;}
@keyframes ringFlash{0%,100%{opacity:1;border-color:#6858E8}50%{opacity:0.2;border-color:#9080E8}}
.brace-qmark.breathe{animation:braceBreath 0.6s ease-in-out infinite;}
@keyframes braceBreath{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.9)}}
.row-divider{height:1px;background:#EAE4D8;margin:2px 0 2px 36px;opacity:0;transition:opacity 0.3s;}
.row-divider.show{opacity:1;}
.brace-row{display:flex;align-items:flex-start;padding-left:36px;opacity:0;transform:translateY(-4px);transition:all 0.4s ease;margin-top:2px;}
.brace-row.show{opacity:1;transform:translateY(0);}
.brace-inner{display:flex;flex-direction:column;align-items:center;gap:2px;}
.brace-qmark{font-size:22px;font-weight:700;color:#E8A000;font-family:'Ma Shan Zheng',cursive;line-height:1;}

/* ---- L2 SPECIFIC ---- */
.l2-section{background:#FAFAF7;border-bottom:1px solid var(--border);display:none;}
.l2-section.show{display:block;}
.info-cards{display:grid;gap:8px;padding:14px 14px 10px;}
.info-card{background:white;border-radius:14px;border:1.5px dashed var(--border);padding:10px 8px;text-align:center;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.35s;}
.info-card.filled{border-style:solid;border-color:#D8CCC0;background:#F8F4EE;}
.info-card.card-done{border-color:#60C898;background:#D8F5E8;animation:cardDone 0.5s ease forwards;}
.info-card.card-faded{border-color:#D8CCC0;background:#F0F0EC;opacity:0.6;}
@keyframes cardDone{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.info-card.highlight{border-color:var(--amber)!important;background:var(--q-bg)!important;box-shadow:0 0 0 3px #E8A00028;transform:scale(1.04);}
.info-card.dim{opacity:0.4;}
.card-lbl{font-size:10px;color:var(--text-soft);letter-spacing:0.5px;margin-bottom:4px;}
.card-val{font-size:14px;font-weight:700;font-family:'Ma Shan Zheng',cursive;opacity:0;transform:translateY(6px);transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.card-val.show{opacity:1;transform:translateY(0);}
.card-val.c-red{color:#C03030;}
.card-val.c-purple{color:#4030C0;}
.card-val.c-amber{color:#A07000;}
.build-area{padding:10px 14px 14px;}
.build-rows{display:flex;flex-direction:column;gap:8px;}
.build-row{display:flex;align-items:center;gap:8px;opacity:0;transition:opacity 0.3s;}
.build-row.show{opacity:1;}
.build-lbl{font-size:11px;color:var(--text-soft);width:28px;flex-shrink:0;text-align:right;}
.build-slots{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;border-bottom:2px solid #D0C8B8;padding-bottom:4px;min-width:120px;}
.slot{width:26px;height:26px;border-radius:0;border:none;background:transparent;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;}
.slot.filled{background:transparent;}
.slot.extra-filled{background:transparent;}
/* fish button: right-aligned */
.fish-btn-wrap{display:flex;justify-content:flex-end;padding:8px 0 4px;padding-right:14px;}
.fish-btn{width:52px;height:52px;border-radius:50%;background:#E8F8F0;border:2px solid #70C898;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 0 #40A870;transition:all 0.15s;user-select:none;animation:kwBob 1s ease-in-out infinite;}
.fish-btn:active{transform:translateY(2px);box-shadow:0 0 0 #40A870;animation:none;}
.fish-btn.disabled{opacity:0.3;pointer-events:none;box-shadow:none;animation:none;}
.build-divider{height:1px;background:#EAE4D8;margin:0 0 0 36px;}
.build-qmark{display:none;font-size:22px;font-weight:700;color:#E8A000;font-family:'Ma Shan Zheng',cursive;text-align:center;padding:4px 0 2px;animation:fadeUp 0.4s ease;}
.build-qmark.show{display:block;}

/* BOTTOM */
.bottom-section{background:var(--bottom-bg);padding:16px 16px 18px;}
.eq-line{min-height:46px;border-bottom:2px solid #D8CCC0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-bottom:8px;margin-bottom:14px;}
.eq-ph{font-size:13px;color:var(--text-soft);font-style:italic;}
.placed{padding:6px 14px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;user-select:none;animation:chipIn 0.28s cubic-bezier(0.34,1.56,0.64,1);background:#FFF0D8;color:#904000;border:1.5px solid #E8B870;}
.placed:active{opacity:0.7;}
.placed.dragging{opacity:0.4;transform:scale(0.95);}
.placed.drag-over{outline:2px solid var(--amber);outline-offset:2px;}
@keyframes chipIn{0%{transform:scale(0.3);opacity:0}100%{transform:scale(1);opacity:1}}
.opts-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;min-height:54px;}
.opt{min-width:48px;height:46px;padding:0 16px;border-radius:10px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;background:#FFF0D8;color:#904000;border:1.5px solid #E8B870;transition:transform 0.12s,opacity 0.2s;box-shadow:0 2px 0 #D09040;}
.opt:active{transform:translateY(2px);box-shadow:none;}
.opt.used{opacity:0.22;pointer-events:none;box-shadow:none;}
.opt.inactive{opacity:0.28;pointer-events:none;box-shadow:none;}
.act-row{display:flex;gap:10px;justify-content:center;}
.btn-reset{padding:11px 22px;border-radius:50px;border:1.5px solid #C8C0B0;background:white;color:var(--text-mid);font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans SC',sans-serif;box-shadow:0 2px 0 #C0B8A8;transition:transform 0.12s;-webkit-appearance:none;}
.btn-reset:active{transform:translateY(2px);box-shadow:none;background:white;}
.btn-reset:focus{outline:none;background:white;}
.btn-reset:hover{background:#F8F4EE;}
.btn-sub{padding:11px 32px;border-radius:50px;border:none;background:#C8C0B0;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;letter-spacing:1px;box-shadow:0 3px 0 #A0988A;transition:all 0.2s;}
.btn-sub.on{background:var(--coral);box-shadow:0 3px 0 #A03800;}
.btn-sub.on:active{transform:translateY(2px);box-shadow:0 1px 0 #A03800;}

.success-layer{display:none;padding:28px 20px;background:var(--bottom-bg);text-align:center;flex-direction:column;align-items:center;gap:8px;}
.success-layer.show{display:flex;animation:fadeUp 0.4s ease;}
.s-ico{font-size:46px;}
.s-tit{font-size:22px;font-weight:700;color:var(--teal);font-family:'Ma Shan Zheng',cursive;}
.s-sub{font-size:13px;color:var(--text-soft);}
.btn-next{margin-top:10px;padding:13px 36px;border-radius:50px;background:var(--teal);color:white;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans SC',sans-serif;letter-spacing:1px;box-shadow:0 3px 0 #208858;transition:transform 0.12s;}
.btn-next:active{transform:translateY(2px);box-shadow:0 1px 0 #208858;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;animation:confettiFall linear forwards;z-index:9999;}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}

/* finger hint */
.finger-hint{
  position:fixed;
  font-size:28px;
  pointer-events:none;
  z-index:9998;
  opacity:0;
  transition:opacity 0.4s;
  animation:fingerBob 0.8s ease-in-out infinite;
  transform-origin:left top;
}
.finger-hint.show{ opacity:1; }
@keyframes fingerBob{
  0%,100%{ transform:translate(0,0) rotate(-20deg); }
  50%{ transform:translate(0,-8px) rotate(-20deg); }
}
.gone{display:none!important;}
.next-arrow-btn{
  width:32px;height:32px;border-radius:50%;
  background:transparent;border:1.5px solid var(--border);
  color:var(--text-mid);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.15s,border-color 0.15s;
  line-height:1;
}
.next-arrow-btn:hover{background:var(--bottom-bg);border-color:#C0B0A0;}
.next-arrow-btn:active{transform:scale(0.93);}
</style>
</head>
<body>
<div id="finger-hint" class="finger-hint">👆</div>
<audio id="bgm" loop preload="auto"></audio>
<div class="phone">

<div class="nav" id="nav">
  <div class="level-tag tag-1" id="nav-tag">梯度一</div>
  <div class="dots">
    <div class="dot d1 active" id="dot1"></div>
    <div class="dot d1" id="dot2"></div>
    <div class="dot d1" id="dot3"></div>
  </div>
</div>

<div class="main-card">
  <div class="q-section">
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px;"><button class="next-arrow-btn" onclick="skipToNext()" title="下一题">&#8594;</button></div>
    <div class="q-row">
      <div class="spk-wrap">
        <div class="spk-ring" id="spk-ring"></div>
        <button class="spk-btn" onclick="doRead()">
          <svg viewBox="0 0 24 24" fill="none" stroke="#E8A000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
      <div class="q-text" id="q-text"></div>
    </div>
  </div>

  <div class="voice-row">
    <span class="chick">🐥</span>
    <div class="v-text" id="v-text">我来读一读这道题～</div>
    <button class="replay-btn" id="replay-btn" onclick="replayVoice()" style="display:none;">🔊</button>
  </div>

  <!-- L1 / L3 scene -->
  <div class="scene-section" id="scene-section">
    <div class="scene-ph" id="scene-ph">
      <div class="scene-ph-txt" id="ph-txt">点击题目中的关键词，看看发生什么～</div>
    </div>
    <div class="flower-row" id="row-a">
      <div class="row-lbl" id="lbl-a">红花</div>
      <div class="flowers" id="flowers-a"></div>
    </div>
    <div class="row-divider" id="row-div"></div>
    <div class="flower-row" id="row-b">
      <div class="row-lbl" id="lbl-b">黄花</div>
      <div class="flowers" id="flowers-b"></div>
    </div>
    <div class="brace-row" id="brace-row">
      <div class="brace-inner" id="brace-inner"></div>
    </div>
  </div>

  <!-- L2 scene: cards + build area -->
  <div class="l2-section" id="l2-section">
    <div class="info-cards" id="l2-cards-wrap" style="grid-template-columns:repeat(3,1fr)!important;">
      <div class="info-card" id="l2-card-0">
        <div class="card-lbl">已知 1</div>
        <div class="card-val c-red" id="l2-cv-0">小猫 4条</div>
      </div>
      <div class="info-card" id="l2-card-1">
        <div class="card-lbl">已知 2</div>
        <div class="card-val c-purple" id="l2-cv-1">多 3条</div>
      </div>
      <div class="info-card" id="l2-card-2">
        <div class="card-lbl">问题</div>
        <div class="card-val c-amber" id="l2-cv-2">小狗几条</div>
      </div>
    </div>
    <!-- build area -->
    <div class="build-area">
      <div class="build-rows">
        <div class="build-row" id="build-row-cat">
          <div class="build-lbl">小猫</div>
          <div class="build-slots" id="slots-cat"></div>
        </div>
        <div class="build-divider"></div>
        <div class="build-row" id="build-row-dog">
          <div class="build-lbl">小狗</div>
          <div class="build-slots" id="slots-dog"></div>
        </div>
      </div>
      <div class="fish-btn-wrap" id="fish-btn-wrap">
        <div class="fish-btn disabled" id="fish-btn" onclick="addFish()">🐟</div>
      </div>
      <div class="brace-row" id="l2-brace-row" style="padding-left:36px;margin-top:4px;">
        <div class="brace-inner" id="l2-brace-inner"></div>
      </div>
      <div class="build-qmark" id="build-qmark">？</div>
    </div>
  </div>

  <div class="bottom-section" id="bottom-section">
    <div class="eq-line" id="eq-line">
      <span class="eq-ph" id="eq-ph">点击下方选项，拼出算式</span>
    </div>
    <div class="opts-pool" id="opts-pool"></div>
    <div class="act-row">
      <button class="btn-reset" onclick="doReset()">↺ 重置</button>
      <button class="btn-sub" id="btn-sub" onclick="doSubmit()">提 交</button>
    </div>
  </div>

  <div class="success-layer gone" id="success-layer">
    <div class="s-ico" id="s-ico">🌸</div>
    <div class="s-tit" id="s-tit">太棒了！</div>
    <div class="s-sub" id="s-sub"></div>
    <button class="btn-next" id="btn-next">进入梯度二 →</button>
  </div>
</div>
</div>

<script>
/* ---- SVG flower ---- */
function mkFlower(color,size=26){
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 28 28');
  svg.setAttribute('width',size);svg.setAttribute('height',size);
  svg.classList.add('flower-svg');
  const g=document.createElementNS(ns,'g');
  g.setAttribute('transform','translate(14,14)');
  [0,72,144,216,288].forEach(a=>{
    const el=document.createElementNS(ns,'ellipse');
    const r=a*Math.PI/180;
    el.setAttribute('cx',(Math.sin(r)*6).toFixed(2));
    el.setAttribute('cy',(-Math.cos(r)*6).toFixed(2));
    el.setAttribute('rx','4.5');el.setAttribute('ry','3');
    el.setAttribute('transform',`rotate(${a})`);
    el.setAttribute('fill',color);el.setAttribute('opacity','0.9');
    g.appendChild(el);
  });

  c.setAttribute('cx','0');c.setAttribute('cy','0');
  c.setAttribute('r','3.5');c.setAttribute('fill','#FFFAD0');
  g.appendChild(c);svg.appendChild(g);
  return svg;
}

function mkBrace(n){
  const fw=26,gap=5,W=n*fw+(n-1)*gap;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} 14`);
  svg.setAttribute('width',W);svg.setAttribute('height',14);
  svg.style.display='block';
  const mid=W/2;
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',`M 4 2 Q 4 10 ${mid-4} 10 Q ${mid} 13 ${mid+4} 10 Q ${W-4} 10 ${W-4} 2`);
  path.setAttribute('stroke','#E8A000');path.setAttribute('stroke-width','2.5');
  path.setAttribute('fill','none');path.setAttribute('stroke-linecap','round');
  svg.appendChild(path);
  return svg;
}

let curLvl=0,readDone=false,found=[];

/* ---- INIT ---- */
function init(){
  // 强制停止所有音频，防止上一梯度的语音链污染新梯度
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  window._initGeneration = (window._initGeneration||0) + 1; // generation counter

  const lvl=getLvl();
  readDone=false;found=[];
  l2BuildPhase=0;catFilled=0;dogBaseFilled=0;dogExtraFilled=0;

  document.getElementById('nav-tag').textContent=lvl.tag;
  document.getElementById('nav-tag').className='level-tag '+lvl.tagCls;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className='dot '+lvl.dotCls;
    if(i<curLvl)d.classList.add('done');
    else if(i===curLvl)d.classList.add('active');
  });

  document.getElementById('spk-ring').classList.remove('off');
  const _rb=document.getElementById('replay-btn');
  if(_rb) _rb.style.display='none';
  const _spkB=document.querySelector('.spk-btn');
  if(_spkB){ _spkB.style.opacity=''; _spkB.style.transform=''; _spkB.style.pointerEvents=''; }
  buildQText();
  setVoiceText('我来读一读这道题～');

  // show/hide scene sections
  const isL2=lvl.sceneType==='l2';
  document.getElementById('scene-section').style.display=isL2?'none':'';
  document.getElementById('l2-section').classList.toggle('show',isL2);

  if(isL2){
    initL2Scene();
  } else {
    resetL1L3Scene();
    // L3: show scene immediately before read
    if(curLvl===2){
      buildL3Scene();
    }
  }

  buildOpts();disableOpts();
  document.getElementById('eq-line').innerHTML='<span class="eq-ph" id="eq-ph">点击下方选项，拼出算式</span>';
  document.getElementById('btn-sub').className='btn-sub';
  document.getElementById('success-layer').classList.add('gone');
  document.getElementById('bottom-section').style.display='';

  // wait for user to click speaker (autoplay blocked by browser)
  // background music continues across levels
  startFingerTimer();
}

/* ---- Q TEXT ---- */
function buildQText(){
  const lvl=getLvl();
  const qt=document.getElementById('q-text');
  qt.innerHTML='';
  lvl.segs.forEach(seg=>{
    if(seg.type==='txt'){
      const sp=document.createElement('span');
      sp.className='seg';sp.id=seg.id;sp.textContent=seg.text;
      if(seg.color)sp.style.color=seg.color;

      qt.appendChild(sp);
      if((curLvl===0||curLvl===1||curLvl===2) && seg.text==='，'){
        const br=document.createElement('br');
        if(curLvl===2) br.classList.add('l3-br');
        qt.appendChild(br);
      }
    } else {
      const sp=document.createElement('span');

/* ---- READ ---- */
function doRead(){
  hideFingerHint();
  unlockAudio();
  if(readDone){
    replayVoice();
    return;
  }
  const lvl=getLvl();
  document.getElementById('spk-ring').classList.add('off');
  const spkBtn=document.querySelector('.spk-btn');
  if(spkBtn) spkBtn.classList.add('reading');

  if(curLvl===2){
    // L3: reveal and speak each phrase sequentially via TTS onend
    readL3Phrases(0, ()=>{
      if(spkBtn) spkBtn.classList.remove('reading');
      readDone=true;
      const rb2=document.getElementById('replay-btn');
      if(rb2) rb2.style.display='flex';
      if(spkBtn){ spkBtn.style.opacity='0.4'; spkBtn.style.transform='scale(0.8)'; spkBtn.style.pointerEvents='none'; }
      setTimeout(()=>{
        const prompt=lvl.voiceSeq[0];
        setVoiceText(prompt);
        speak(prompt);
        enableOpts();
      },400);
    });
  } else {
    // L1/L2: original timing-based read
    const fullText=lvl.segs.map(s=>s.text).join('');
    speak(fullText,{rate:0.85});
    let t=0;
    lvl.readPhrases.forEach(phrase=>{
      setTimeout(()=>{clearLit();phrase.lit.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('lit');});},t);
      t+=phrase.stay;
      setTimeout(()=>clearLit(),t);
      t+=phrase.pause;
    });
    setTimeout(()=>{
      if(spkBtn) spkBtn.classList.remove('reading');
      readDone=true;
      setTimeout(()=>{
        const prompt=getLvl().voiceSeq[0];
        setVoiceText(prompt);
        const u=speak(prompt);
        const afterPrompt=()=>{
          upgradeKwBtns();
          // dim main spk, show replay btn
          const rb=document.getElementById('replay-btn');
          if(rb) rb.style.display='flex';
          const spk=document.querySelector('.spk-btn');
          if(spk){ spk.style.opacity='0.4'; spk.style.transform='scale(0.8)'; spk.style.pointerEvents='none'; }
        };
        if(u) u.onend=afterPrompt;
        else setTimeout(afterPrompt,1800);
      },400);
    },t+100);
  }
}

function readL3Phrases(idx, onDone){
  const lvl=getLvl();
  if(idx >= lvl.readPhrases.length){ onDone(); return; }
  const phrase=lvl.readPhrases[idx];
  // highlight segs in this phrase
  phrase.lit.forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.classList.add('lit'); }
  });
  // get text for this phrase
  const phraseText=phrase.lit.map(id=>{
    const el=document.getElementById(id);
    return el?el.textContent:'';
  }).join('');
  const u=speak(phraseText);
  const afterSpeak=()=>{
    clearLit();
    // pause between phrases then continue
    setTimeout(()=> readL3Phrases(idx+1, onDone), phrase.pause||500);
  };
  if(u) u.onend=afterSpeak;
  else setTimeout(afterSpeak, phrase.stay||1200);
}

function clearLit(){document.querySelectorAll('#q-text .lit').forEach(e=>e.classList.remove('lit'));}

function upgradeKwBtns(){
  if(curLvl===2) return; // L3: no interactive buttons
  getLvl().segs.filter(s=>s.type==='kw').forEach(seg=>{
    const el=document.getElementById(seg.id);
    if(!el)return;
    el.classList.remove('as-text','lit');
    if(seg.kwt==='wrong'){
      el.classList.add('wrong-kw');
      el.onclick=()=>wrongKwClick(el);
    } else if(seg.kwt==='wrong-dog'){
      el.classList.add('wrong-dog');
      el.onclick=()=>wrongKwClick(el);
    } else {
      el.classList.add(seg.kwt==='num1'?'active-num1':seg.kwt==='num2'?'active-num2':'active-q');
      el.onclick=()=>kwClick(el);
    }
  });
}

/* ---- KW CLICK ---- */
function wrongKwClick(el){
  playSound('wrong');
  el.classList.add('wrong-shake');
  speak('这个不是关键信息，再找找～');
  setVoiceText('这个不是关键信息，再找找～');
  setTimeout(()=>el.classList.remove('wrong-shake'),500);
}

function kwClick(el){
  if(!readDone)return;
  const key=el.dataset.key,kwt=el.dataset.kwt;
  if(found.includes(key))return;
  playSound('correct');
  launchConfetti(12, getCardCenterX());
  found.push(key);
  // k3a clicked: deactivate sb4b to plain text completely
  if(key==='k3a'){
    const s=document.getElementById('sb4b');
    if(s){
      s.className='seg'; // remove ALL kw classes
      s.style.cssText='font-family:"Ma Shan Zheng",cursive;font-size:17px;color:var(--text);background:transparent;border:none;animation:none;cursor:default;padding:1px 6px;';
      s.onclick=null;
    }
  }
  el.classList.remove('active-num1','active-num2','active-q');
  el.classList.add(kwt==='num1'?'done-num1':kwt==='num2'?'done-num2':'done-q');
  el.onclick=null;el.style.cursor='default';
  const lvl=getLvl();
  const feedback=lvl.kwFeedback[key]||'';
  const realFound=found.filter(k=>!k.startsWith('w'));
  // map k3a/k3b to k3 for card/voice indexing
  const mappedFound=realFound.map(k=>L2_KEY_MAP&&L2_KEY_MAP[k]?L2_KEY_MAP[k]:k);
  const uniqueMapped=[...new Set(mappedFound)];
  const nextIdx=uniqueMapped.length;
  const nextPrompt=lvl.voiceSeq[nextIdx]||'';
  setVoiceText(feedback);
  // scene trigger
  if(lvl.sceneType==='l1l3') triggerL1Scene(key);
  if(lvl.sceneType==='l2'){
    fillL2Card(key);
    // flash purple rings on k2
    if(key==='k2'){
      setTimeout(()=>{
        document.querySelectorAll('.flower-extra-ring').forEach(r=>r.classList.add('flash'));
      },400);
    }
  }
  if(feedback){
    const u=speak(feedback);
    const afterFeedback=()=>{
      if(lvl.sceneType==='l1l3' && (key==='k2'||key==='k3')) return;
      if(lvl.sceneType==='l2' && (key==='k3'||key==='k3a'||key==='k3b')) return;
      // L2 k1/k2: chain secondary feedback after 2s pause
      if(lvl.sceneType==='l2' && (key==='k1'||key==='k2') && lvl.kwFeedback2&&lvl.kwFeedback2[key]){
        setTimeout(()=>{
          const msg2=lvl.kwFeedback2[key];
          const u2=speak(msg2);
          setVoiceText(msg2);
          const afterF2=()=>{
            if(nextPrompt){
              const u3=speak(nextPrompt);
              setVoiceText(nextPrompt);
              // after voiceSeq[2] plays, reveal question phase
              const afterPrompt2=()=>{ setTimeout(()=>revealL2QuestionPhase(),300); };
              if(u3)u3.onend=afterPrompt2; else setTimeout(afterPrompt2,1800);
            } else {
              setTimeout(()=>revealL2QuestionPhase(),300);
            }
          };
          if(u2)u2.onend=afterF2; else setTimeout(afterF2,1400);
        },2000);
        return;
      }
      if(nextPrompt){
        setTimeout(()=>{setVoiceText(nextPrompt);speak(nextPrompt);},300);
      }
    };
    const _gen=window._initGeneration||0;
    if(u)u.onend=afterFeedback;
    else setTimeout(()=>{ if((window._initGeneration||0)===_gen) afterFeedback(); },1400);
  } else if(nextPrompt){
    if(!(lvl.sceneType==='l1l3' && (key==='k2'||key==='k3')) &&
       !(lvl.sceneType==='l2' && (key==='k3'||key==='k3a'||key==='k3b')) &&
       !(lvl.sceneType==='l2' && key==='k2')) setVoice(nextPrompt);
  }
}

/* ---- L2 CARDS ---- */
const L2_CARD_KEYS=['k1','k2','k3'];
const L2_KEY_MAP={'k1':'k1','k2':'k2','k3a':'k3'};
function fillL2Card(key){
  const mappedKey=L2_KEY_MAP[key]||key;
  const idx=L2_CARD_KEYS.indexOf(mappedKey);
  if(idx<0)return;
  const card=document.getElementById(`l2-card-${idx}`);
  const cv=document.getElementById(`l2-cv-${idx}`);
  card.classList.add('filled');
  cv.classList.add('show');
  // flash green for question card too
  if(mappedKey==='k3'){
    setTimeout(()=>flashCardDone(2),400);
  }
  const realFound=found.filter(k=>!k.startsWith('w'));
  const mappedF=[...new Set(realFound.map(k=>L2_KEY_MAP&&L2_KEY_MAP[k]?L2_KEY_MAP[k]:k))];
  if(mappedF.length===2){
    // question phase reveal is triggered after voice chain completes (in afterF2)
  }
  if(mappedF.length===3){
    // all found, start build after 3s pause
    setTimeout(()=>startL2Build(),3000);
  }
}

function revealL2QuestionPhase(){
  // stop all kw animations, make them plain text
  document.querySelectorAll('#q-text .kw').forEach(el=>{
    if(!el.classList.contains('done-num1') && !el.classList.contains('done-num2')){
      el.classList.remove('wrong-kw','wrong-dog','active-num1','active-num2','active-q','as-text');
      el.style.animation='none';
      el.style.background='transparent';
      el.style.border='none';
      el.style.color='var(--text)';
      el.style.cursor='default';
      el.onclick=null;
    }
  });
  // highlight the third card (问题) to signal it's next
  resetL2CardHighlight();
  const card2=document.getElementById('l2-card-2');
  if(card2) card2.classList.add('highlight');
  // activate only sb4a (小狗) as active-q; sb4b (钓了几条) becomes wrong
  const qa=document.getElementById('sb4a');
  if(qa){
    qa.classList.remove('as-text','wrong-dog','wrong-kw');
    qa.style.animation='';qa.style.background='';
    qa.style.border='';qa.style.color='';qa.style.cursor='';
    qa.classList.add('active-q');
    qa.onclick=()=>kwClick(qa);
  }
  const qb=document.getElementById('sb4b');
  if(qb){
    qb.classList.remove('as-text','active-q');
    qb.style.animation='';qb.style.background='';
    qb.style.border='';qb.style.color='';qb.style.cursor='';
    qb.classList.add('wrong-dog');
    qb.onclick=()=>wrongKwClick(qb);
  }
  // voice prompt is handled by the afterFeedback chain in kwClick
  // just update the display text here
  const prompt=getLvl().voiceSeq[2]||'';
  if(prompt){ setVoiceText(prompt); }
}

function highlightL2Card(activeKey){

/* ---- L2 BUILD ---- */
function buildL2Brace(n){
  const inner=document.getElementById('l2-brace-inner');
  inner.innerHTML='';
  const fw=30,gap=5,total=n*fw+(n-1)*gap;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${total} 14`);
  svg.setAttribute('width',total);svg.setAttribute('height',14);
  svg.style.display='block';
  const mid=total/2;
  const path=document.createElementNS(ns,'path');
  path.setAttribute('d',`M 4 2 Q 4 10 ${mid-4} 10 Q ${mid} 13 ${mid+4} 10 Q ${total-4} 10 ${total-4} 2`);
  path.setAttribute('stroke','#E8A000');path.setAttribute('stroke-width','2.5');
  path.setAttribute('fill','none');path.setAttribute('stroke-linecap','round');
  svg.appendChild(path);
  inner.appendChild(svg);
  const q=document.createElement('div');
  q.className='brace-qmark';q.textContent='？';
  inner.appendChild(q);
  document.getElementById('l2-brace-row').classList.add('show');
}

function sceneHighlight(val){
  if(curLvl!==0) return; // only for L1
  const ANIM_DURATION=3000;
  if(val==='3'){
    // red dashed ring around each red flower for 3s
    const redFlowers=document.querySelectorAll('#flowers-a .flower-svg.show');
    redFlowers.forEach(f=>{
      // wrap in relative container if not already
      const parent=f.parentElement;
      if(!parent) return;
      // add ring overlay
      const ring=document.createElement('div');
      ring.className='scene-hl-ring red flash-red';
      ring.style.cssText='position:absolute;inset:-4px;border-radius:50%;border:2px dashed #E84848;pointer-events:none;';
      // ensure parent is relative
      const pw=f.closest('.flower-extra-wrap')||f.parentElement;
      const wrap=document.createElement('div');
      wrap.style.cssText='position:relative;display:inline-flex;flex-shrink:0;width:26px;height:26px;';
      f.parentElement.insertBefore(wrap,f);
      wrap.appendChild(f);
      wrap.appendChild(ring);
      setTimeout(()=>{ ring.remove(); wrap.parentElement&&wrap.parentElement.insertBefore(f,wrap); wrap.remove(); },ANIM_DURATION+200);
    });
  } else if(val==='4'){
    // purple dashed ring around the 4 extra yellow flowers
    const extraWraps=document.querySelectorAll('#flowers-b .flower-extra-wrap.show');
    extraWraps.forEach(wrap=>{
      const ring=document.createElement('div');
      ring.style.cssText='position:absolute;inset:-4px;border-radius:50%;border:2px dashed #6858E8;pointer-events:none;animation:hlFlashPurple 1s ease-in-out 3;';
      wrap.style.position='relative';
      wrap.appendChild(ring);
      setTimeout(()=>ring.remove(),ANIM_DURATION+200);
    });
  } else if(val==='7'){
    // all 7 yellow flowers breathe: base flowers (flower-svg) + extra wraps
    const baseYellow=document.querySelectorAll('#flowers-b .flower-svg.show');
    const extraYellow=document.querySelectorAll('#flowers-b .flower-extra-wrap.show');
    baseYellow.forEach(f=>{
      f.classList.add('breathe-yellow');
      setTimeout(()=>f.classList.remove('breathe-yellow'),ANIM_DURATION+200);
    });
    extraYellow.forEach(wrap=>{
      wrap.classList.add('breathe-yellow-wrap');
      setTimeout(()=>wrap.classList.remove('breathe-yellow-wrap'),ANIM_DURATION+200);
    });
  }
}

function placeOpt(el){
  if(el.classList.contains('used')||el.classList.contains('inactive'))return;
  playSound('tap');
  const val=el.dataset.val.replace(/[()]/g,'');
  const speakVal = val==='只' ? 'zhī' : val;
  speak(speakVal);
  sceneHighlight(val);
  el.classList.add('used');
  const line=document.getElementById('eq-line');
  const ph=document.getElementById('eq-ph');
  if(ph)ph.style.display='none';
  const p=document.createElement('div');
  p.className='placed';p.textContent=el.dataset.val;
  p.dataset.uidx=el.dataset.uidx;
  p.onclick=()=>{playSound('tap');p.remove();el.classList.remove('used');updateSub();};
  makePlacedDraggable(p,el);
  line.appendChild(p);updateSub();
}

function updateSub(){
  const n=document.getElementById('eq-line').querySelectorAll('.placed').length;
  document.getElementById('btn-sub').className='btn-sub'+(n>=4?' on':'');
}

function doSubmit(){
  if(!document.getElementById('btn-sub').classList.contains('on'))return;
  const vals=Array.from(document.getElementById('eq-line').querySelectorAll('.placed')).map(p=>p.textContent);
  const lvl=getLvl();
  // Smart check: nums can be in any order, op and result and unit must be correct
  // expected form: num op num = result unit  (6 items)
  function isCorrect(v){
    if(v.length!==6)return false;
    const nums=[v[0],v[2]];
    const op=v[1];
    const eq=v[3];
    const res=v[4];
    const unit=v[5];
    if(eq!=='=')return false;
    if(op!==lvl.correctOp)return false;
    if(res!==lvl.correctResult)return false;
    if(unit!==lvl.correctUnit)return false;
    // nums in any order
    const cn=[...lvl.correctNums].sort();
    const gn=[...nums].sort();
    return JSON.stringify(cn)===JSON.stringify(gn);
  }
  if(isCorrect(vals)){
    playSound('success');
    launchConfetti(60, getCardCenterX());
    setTimeout(()=>launchConfetti(40, getCardCenterX()-80),300);
    setTimeout(()=>launchConfetti(40, getCardCenterX()+80),500);
    document.getElementById('bottom-section').style.display='none';
    const sl=document.getElementById('success-layer');
    sl.classList.remove('gone');sl.classList.add('show');
    document.getElementById('s-ico').textContent=lvl.success.ico;
    document.getElementById('s-tit').textContent=lvl.success.tit;
    document.getElementById('s-sub').textContent=lvl.success.sub;
    const nb=document.getElementById('btn-next');
    nb.textContent=lvl.success.next;
    nb.style.background=curLvl===2?'#6858E8':'#38B880';
    nb.style.boxShadow=curLvl===2?'0 3px 0 #3828A8':'0 3px 0 #208858';
    nb.onclick=()=>{if(curLvl<2){curLvl++;init();}else{curLvl=0;init();}};
    speak(lvl.success.tit);
  } else {
    playSound('wrong');
    document.getElementById('eq-line').style.borderBottomColor='#E08080';
    setVoice('再检查一下～');
    setTimeout(()=>document.getElementById('eq-line').style.borderBottomColor='',1200);
  }
}

/* ---- SOUND EFFECTS ---- */
let audioCtx=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type){
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='tap'){
      o.frequency.setValueAtTime(600,ctx.currentTime);
      g.gain.setValueAtTime(0.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.start();o.stop(ctx.currentTime+0.08);
    } else if(type==='correct'){
      o.frequency.setValueAtTime(520,ctx.currentTime);
      o.frequency.setValueAtTime(660,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='wrong'){
      o.type='sawtooth';
      o.frequency.setValueAtTime(220,ctx.currentTime);
      g.gain.setValueAtTime(0.12,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    } else if(type==='success'){
      [0,0.12,0.24].forEach((t,i)=>{
        const o2=ctx.createOscillator();
        const g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.setValueAtTime([520,660,780][i],ctx.currentTime+t);
        g2.gain.setValueAtTime(0.2,ctx.currentTime+t);
        g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
        o2.start(ctx.currentTime+t);o2.stop(ctx.currentTime+t+0.25);
      });
    } else if(type==='fish'){
      o.frequency.setValueAtTime(440,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+0.06);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
      o.start();o.stop(ctx.currentTime+0.1);
    }
  }catch(e){}
}

/* ---- DRAGGABLE EQ LINE ---- */
let dragSrc=null;
function makePlacedDraggable(p,srcEl){
  p.draggable=true;
  p.addEventListener('dragstart',e=>{
    dragSrc=p;
    e.dataTransfer.effectAllowed='move';
    setTimeout(()=>p.classList.add('dragging'),0);
  });
  p.addEventListener('dragend',()=>{
    p.classList.remove('dragging');
    dragSrc=null;
    document.querySelectorAll('.placed').forEach(x=>x.classList.remove('drag-over'));
  });
  p.addEventListener('dragover',e=>{
    e.preventDefault();
    if(dragSrc&&dragSrc!==p){
      document.querySelectorAll('.placed').forEach(x=>x.classList.remove('drag-over'));
      p.classList.add('drag-over');
    }
  });
  p.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragSrc&&dragSrc!==p){
      const line=document.getElementById('eq-line');
      const children=Array.from(line.querySelectorAll('.placed'));
      const srcIdx=children.indexOf(dragSrc);
      const tgtIdx=children.indexOf(p);
      if(srcIdx<tgtIdx) line.insertBefore(dragSrc,p.nextSibling);
      else line.insertBefore(dragSrc,p);
      p.classList.remove('drag-over');
      playSound('tap');
    }
  });
}

/* ---- SPEECH ---- */
const TTS_API='https://tts.mathufo.com/tts';
const TTS_CDN='https://cdn.mathufo.com/sound/';
const TTS_VOICE='zh_male_tiancaitongsheng_mars_bigtts';
const ttsCache={};
let currentAudio=null;

function unlockAudio(){
  // create and immediately play a silent buffer to unlock audio context
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
    ctx.resume();
  }catch(e){}
}

function speak(text,opts={}){
  if(!text) return null;
  const clean=text.trim();
  if(!clean) return null;
  const gen=window._initGeneration||0;
  const handle={onend:null,_done:false};
  const doPlay=(url)=>{
    if(currentAudio){ currentAudio.pause(); currentAudio=null; }
    const audio=new Audio(url);
    currentAudio=audio;
    audio.onended=()=>{
      if((window._initGeneration||0)!==gen) return;
      handle._done=true;
      if(handle.onend) handle.onend();
    };
    audio.onerror=()=>{
      if((window._initGeneration||0)!==gen) return;
      handle._done=true;
      if(handle.onend) handle.onend();
    };
    audio.play().catch(()=>{
      if((window._initGeneration||0)!==gen) return;
      handle._done=true;
      if(handle.onend) handle.onend();
    });
  };
  if(ttsCache[clean]){
    setTimeout(()=>doPlay(ttsCache[clean]),0);
  } else {
    fetch(TTS_API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:[clean],voice_name:TTS_VOICE})
    })
    .then(r=>r.json())
    .then(json=>{
      if((window._initGeneration||0)!==gen) return;
      if(json.data&&json.data[0]){
        const url=TTS_CDN+json.data[0];
        ttsCache[clean]=url;
        doPlay(url);
      } else {
        handle._done=true;
        if(handle.onend) handle.onend();
      }
    })
    .catch(()=>{
      if((window._initGeneration||0)!==gen) return;
      handle._done=true;
      if(handle.onend) handle.onend();
    });
  }
  return handle;
}

function setVoiceText(t){document.getElementById('v-text').textContent=t;}
function setVoice(t){setVoiceText(t);speak(t);}

function replayVoice(){
  const t=document.getElementById('v-text').textContent;
  if(t) speak(t);
  // brief visual feedback on replay btn
  const rb=document.getElementById('replay-btn');
  if(rb){ rb.style.opacity='1'; setTimeout(()=>rb.style.opacity='0.7',400); }
}

function skipToNext(){
  if(curLvl<2){curLvl++;init();}
  else{curLvl=0;init();}
}


/* ---- FINGER HINT ---- */
let _fingerTimer = null;

function showFingerHint(){
  const spk = document.querySelector('.spk-btn');
  if(!spk) return;
  const hint = document.getElementById('finger-hint');
  if(!hint) return;
  const r = spk.getBoundingClientRect();
  // position finger just below-right of speaker button
  hint.style.left = (r.right - 8) + 'px';
  hint.style.top  = (r.bottom - 4) + 'px';
  hint.classList.add('show');
}

function hideFingerHint(){
  const hint = document.getElementById('finger-hint');
  if(hint) hint.classList.remove('show');
  if(_fingerTimer){ clearTimeout(_fingerTimer); _fingerTimer=null; }
}

function startFingerTimer(){
  hideFingerHint();
  _fingerTimer = setTimeout(()=> showFingerHint(), 3000);
}

init();

    document.removeEventListener('touchstart',startBgm);

  document.addEventListener('touchstart',startBgm);
})();
